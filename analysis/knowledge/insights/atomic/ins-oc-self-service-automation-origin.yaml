insight_id: ins-oc-self-service-automation-origin
title: Workflow owners originate many automations themselves
pillar: Operating Capabilities
dimension: Review and Learning Culture
claim_type: descriptive
maturity_level: m1
summary: >
  Two startup transcripts describe self-service automation as job-owner-led: the
  people closest to the work identify improvement opportunities and build agents
  or apps for parts of their own jobs rather than waiting for centrally assigned
  workflows.

