insight_id: ins-oc-permissioned-read-only-agent-access
title: Agent access is permissioned and read-only where write-side risk is high
pillar: Operating Capabilities
dimension: Judgment and Accountability
claim_type: descriptive
maturity_level: m2
summary: >
  Three interviews describe intentionally constrained AI access: one via a
  permissioned gateway for internally built apps, one via read-only production
  database access, and one via read-only client-platform integration users to
  avoid changing customer records.

